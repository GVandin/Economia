<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Lab: Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }
        
        .slider { @apply w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer outline-none transition-all; }
        .slider::-webkit-slider-thumb { @apply appearance-none w-4 h-4 rounded-full bg-indigo-500 hover:bg-indigo-400 cursor-pointer; }
        
        .panel { @apply bg-[#0f172a] border border-slate-800/80 rounded-xl p-5 shadow-2xl; }
        
        .code-input { 
            @apply w-full border border-slate-700 rounded-md p-3 text-[12px] font-mono transition-all outline-none;
            background-color: #000000; 
            color: #ffffff; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .code-input:focus { @apply border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.2)]; }
        .code-input.error { @apply border-red-500 shadow-[0_0_10px_rgba(239,68,68,0.2)]; }
        
        .badge { @apply px-2 py-1 bg-slate-800 text-slate-300 rounded text-[10px] font-mono border border-slate-700; }
        .step-num { @apply inline-flex items-center justify-center w-5 h-5 rounded bg-slate-800 text-[10px] font-black mr-2 border border-slate-700; }
    </style>
</head>
<body class="p-4 lg:p-6 min-h-screen flex flex-col">

    <header class="mb-6 flex justify-between items-end border-b border-slate-800 pb-4">
        <div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400 tracking-tight">SOVEREIGN LAB</h1>
            <p class="text-xs text-slate-500 font-mono mt-1">v3.0 // Dynamic Equation Context Engine</p>
        </div>
        <div id="status-led" class="text-xs font-mono font-bold px-3 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> SYSTEM ONLINE
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="panel border-t-2 border-t-indigo-500">
                <h2 class="text-sm font-black mb-5 text-slate-200 tracking-wider">INPUT POLITICI</h2>
                <div class="space-y-6">
                    <!-- NUOVO SLIDER: RATIO SALARIALE -->
                    <div>
                        <div class="flex justify-between mb-2"><label class="text-xs font-bold text-slate-400">Ratio Salariale (1:X)</label><span id="v-ratio" class="text-xs font-black text-purple-400 font-mono">20</span></div>
                        <input type="range" id="ratio" min="5" max="50" value="20" class="slider" style="accent-color: #a855f7;">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2"><label class="text-xs font-bold text-slate-400">Scala Mobile (sm)</label><span id="v-sm" class="text-xs font-black text-indigo-400 font-mono">0%</span></div>
                        <input type="range" id="sm" min="0" max="100" value="0" class="slider" style="accent-color: #6366f1;">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2"><label class="text-xs font-bold text-slate-400">Extraprofitti (te)</label><span id="v-te" class="text-xs font-black text-red-400 font-mono">15%</span></div>
                        <input type="range" id="te" min="0" max="95" value="15" class="slider" style="accent-color: #f87171;">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2"><label class="text-xs font-bold text-slate-400">Migrazione (fm)</label><span id="v-fm" class="text-xs font-black text-emerald-400 font-mono">0.35</span></div>
                        <input type="range" id="fm" min="0" max="100" value="35" class="slider" style="accent-color: #34d399;">
                    </div>
                    <div class="flex items-center justify-between p-3 bg-slate-950 rounded-lg border border-slate-800">
                        <label class="text-xs font-bold text-slate-400">Regolarizzazione (reg)</label>
                        <input type="checkbox" id="regToggle" class="w-5 h-5 accent-emerald-500 rounded cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="panel flex-grow">
                <h2 class="text-xs font-black mb-3 text-slate-500 tracking-wider">DICTIONARY</h2>
                <div class="flex flex-wrap gap-2">
                    <span class="badge"><span class="text-blue-400">potere</span> = currS/currP</span>
                    <span class="badge"><span class="text-blue-400">inflBase</span> = 0.018/0.08</span>
                    <span class="badge">ratio, sm, te, fm</span>
                    <span class="badge">reg (1 o 0)</span>
                    <span class="badge">currS, currP, currD</span>
                </div>
                <div id="error-log" class="mt-4 text-[11px] text-red-400 font-mono font-bold leading-tight"></div>
            </div>
        </div>

        <div class="lg:col-span-4 panel border-t-2 border-t-emerald-500 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-black text-slate-200 tracking-wider">LOGIC ENGINE</h2>
                <span class="text-[9px] text-emerald-500 font-mono uppercase border border-emerald-500/30 px-2 py-0.5 rounded">Execution Order: Top to Bottom</span>
            </div>
            
            <div class="space-y-4 flex-grow overflow-y-auto pr-2 custom-scrollbar">
                <div>
                    <label class="text-[10px] font-bold text-pink-400 uppercase tracking-wider mb-1 flex items-center"><span class="step-num text-pink-400">1 - </span> Calo Demografico (demo)</label>
                    <textarea id="eq-demo" class="code-input" rows="1">0.018 + (potere < 0.95 ? (0.95 - potere) * 0.5 : 0) - (ratio < 12 ? 0.005 : 0)</textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-orange-400 uppercase tracking-wider mb-1 flex items-center"><span class="step-num text-orange-400">2 - </span> Fuga Capitali e Cervelli (fuga)</label>
                    <textarea id="eq-fuga" class="code-input" rows="1">((te > 0.45) ? (te - 0.45) * 6 : 0) + ((ratio < 12) ? (12 - ratio) * 0.1 : 0)</textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider mb-1 flex items-center"><span class="step-num text-emerald-400">3 - </span> Gap Manodopera (gap)</label>
                    <textarea id="eq-gap" class="code-input" rows="1">demo - (fm * (reg ? 0.95 : 0.35))</textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-red-400 uppercase tracking-wider mb-1 flex items-center"><span class="step-num text-red-400">4 - </span> Inflazione (infl)</label>
                    <textarea id="eq-infl" class="code-input" rows="1">inflBase + (sm * 0.05) - (te * 0.01)</textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-400 uppercase tracking-wider mb-1 flex items-center"><span class="step-num text-blue-400">5 - </span> Variazione Salari (deltaW)</label>
                    <textarea id="eq-wage" class="code-input" rows="1">(infl * sm) + (gap * 0.18) + 0.002</textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-white uppercase tracking-wider mb-1 flex items-center"><span class="step-num text-white">6 - </span> Incremento Debito (deltaD)</label>
                    <textarea id="eq-debt" class="code-input" rows="2">(sm * 5) + (demo * 180) - (reg ? fm * 12 : 0) + (fuga * 35) - (te * 8) - 1.5</textarea>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-4">
            <div class="panel flex-grow relative pb-8">
                <h3 class="absolute top-4 right-5 text-[10px] font-bold text-slate-500 font-mono uppercase">Salari vs Prezzi</h3>
                <canvas id="chartWages"></canvas>
            </div>
            <div class="panel flex-grow relative pb-8">
                <h3 class="absolute top-4 right-5 text-[10px] font-bold text-slate-500 font-mono uppercase">Debito Macro</h3>
                <canvas id="chartMacro"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chartW, chartM;
        const ANNI = Array.from({length: 35}, (_, i) => 1992 + i);
        
        const realWages = ANNI.map((a, i) => 1000 * Math.pow(1.004, i));
        let pB = 1000;
        const realPrices = ANNI.map(a => { pB *= (1 + (a > 2021 ? 0.07 : a > 2000 ? 0.018 : 0.04)); return pB; });
        const realDebt = ANNI.map((a, i) => 105 + (i * 1.65) + (a > 2020 ? 18 : 0));

        function evaluateExpression(expr, context) {
            const keys = Object.keys(context);
            const values = Object.values(context);
            const func = new Function(...keys, `return (${expr});`);
            return func(...values);
        }

        function setStatus(isError, msg = "") {
            const led = document.getElementById('status-led');
            const log = document.getElementById('error-log');
            document.querySelectorAll('.code-input').forEach(el => el.classList.remove('error'));
            
            if (isError) {
                led.className = "text-xs font-mono font-bold px-3 py-1 rounded bg-red-500/10 text-red-500 border border-red-500/50 flex items-center gap-2";
                led.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> ERROR`;
                log.innerText = `🚨 ${msg}`;
            } else {
                led.className = "text-xs font-mono font-bold px-3 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 flex items-center gap-2";
                led.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> ONLINE`;
                log.innerText = "";
            }
        }

        function simulate() {
            const sm = document.getElementById('sm').value / 100;
            const te = document.getElementById('te').value / 100;
            const fm = document.getElementById('fm').value / 100;
            const ratio = parseFloat(document.getElementById('ratio').value);
            const reg = document.getElementById('regToggle').checked ? 1 : 0;

            document.getElementById('v-sm').innerText = (sm * 100).toFixed(0) + "%";
            document.getElementById('v-te').innerText = (te * 100).toFixed(0) + "%";
            document.getElementById('v-fm').innerText = fm.toFixed(2);
            document.getElementById('v-ratio').innerText = "1:" + ratio;

            let s = [], p = [], d = [];
            let currS = 1000, currP = 1000, currD = 105;
            let currentEqId = "";

            try {
                ANNI.forEach((anno) => {
                    let ctx = { anno, sm, te, fm, ratio, reg, currS, currP, currD };
                    ctx.inflBase = (anno > 2021) ? 0.08 : 0.018;
                    ctx.potere = currS / currP;

                    currentEqId = 'eq-demo'; ctx.demo = evaluateExpression(document.getElementById(currentEqId).value, ctx);
                    currentEqId = 'eq-fuga'; ctx.fuga = evaluateExpression(document.getElementById(currentEqId).value, ctx);
                    currentEqId = 'eq-gap';  ctx.gap  = evaluateExpression(document.getElementById(currentEqId).value, ctx);
                    currentEqId = 'eq-infl'; ctx.infl = evaluateExpression(document.getElementById(currentEqId).value, ctx);
                    currentEqId = 'eq-wage'; ctx.deltaW = evaluateExpression(document.getElementById(currentEqId).value, ctx);
                    currentEqId = 'eq-debt'; ctx.deltaD = evaluateExpression(document.getElementById(currentEqId).value, ctx);

                    s.push(currS); p.push(currP); d.push(currD);

                    currS *= (1 + ctx.deltaW);
                    currP *= (1 + ctx.infl);
                    currD += ctx.deltaD;
                });
                
                setStatus(false);
                render(s, p, d);

            } catch (e) {
                setStatus(true, `Syntax Error at [${currentEqId.replace('eq-','').toUpperCase()}]:\n${e.message}`);
                document.getElementById(currentEqId).classList.add('error');
            }
        }

        Chart.defaults.color = '#64748b';
        Chart.defaults.font.family = "'Fira Code', monospace";
        
        function render(s, p, d) {
            if(chartW) chartW.destroy(); if(chartM) chartM.destroy();
            
            const gridOpts = { color: '#1e293b', drawBorder: false };
            const commonOptions = {
                responsive: true, maintainAspectRatio: false, animation: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } },
                scales: { 
                    x: { grid: { display: false } }, 
                    y: { grid: gridOpts } 
                }
            };

            chartW = new Chart(document.getElementById('chartWages'), {
                type: 'line',
                data: { labels: ANNI, datasets: [
                    { label: 'SIM Salari', data: s, borderColor: '#6366f1', borderWidth: 2, tension: 0.2, pointRadius: 0 },
                    { label: 'SIM Prezzi', data: p, borderColor: '#f43f5e', borderWidth: 2, borderDash: [4,4], tension: 0.2, pointRadius: 0 },
                    { label: 'REAL Prezzi', data: realPrices, borderColor: '#475569', borderWidth: 1, tension: 0.2, pointRadius: 0 },
                    { label: 'REAL Salari', data: realWages, borderColor: '#475569', borderWidth: 1, borderDash: [3,3], tension: 0.2, pointRadius: 0 }
                ]}, options: commonOptions
            });

            chartM = new Chart(document.getElementById('chartMacro'), {
                type: 'line',
                data: { labels: ANNI, datasets: [
                    { label: 'SIM Debito', data: d, borderColor: '#f8fafc', borderWidth: 2, tension: 0.2, pointRadius: 0 },
                    { label: 'REAL Debito', data: realDebt, borderColor: '#475569', borderWidth: 1, borderDash: [3,3], tension: 0.2, pointRadius: 0 }
                ]}, options: commonOptions
            });
        }

        document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', simulate));
        window.addEventListener('resize', simulate);
        simulate();
    </script>
</body>
</html>
